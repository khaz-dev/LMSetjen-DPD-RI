services:
  db:
    image: postgres:16-alpine
    container_name: lms_db_container
    restart: unless-stopped
    # 🌟 ADD THIS LINE: Forces Postgres to change its internal engine port to 5433
    command: -p 5433
    environment:
      POSTGRES_DB: ${DB_NAME:-lmsdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Okkdpdri@2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5433"  # Exposes port 5433 to the host machine if needed
    networks:
      - lms_network

  redis:
    image: redis:7-alpine
    container_name: lms_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6381:6381"
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: lms_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Database Configuration
      # Uses existing PostgreSQL on host machine (gateway IP for Linux Docker)
      # Use the Docker network gateway to access host services
      DB_NAME: ${DB_NAME:-lmsdb}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Okkdpdri@2026}
      # Do not hardcode Docker gateway IP; this differs across hosts.
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5433}
      
      # Redis Cache (always Docker)
      REDIS_HOST: redis
      REDIS_PORT: 6381
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6381/0
      
      # Django Core Settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,django,lms.dpd.go.id}
      
      # Email Configuration
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      
      # Site URLs
      FRONTEND_SITE_URL: ${FRONTEND_SITE_URL:-http://localhost:5174}
      BACKEND_SITE_URL: ${BACKEND_SITE_URL:-http://localhost:8001}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
      
      # OAuth Configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}

      # CORS & Security
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5174,https://lms.dpd.go.id}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,https://lms.dpd.go.id}

      # SSL: force Python requests to use system CA bundle (includes our custom CMB DPD cert)
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      
    volumes:
      - ./backend:/app
      # ⚠️ PHASE 3: media_files volume kept for backward compatibility only
      # NO LONGER USED for new content (using external URLs instead)
      - media_files:/app/media
      - static_files:/app/staticfiles
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_HOST_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    networks:
      - lms_network
    command: >
      sh -c "
        echo '🔄 Waiting for database (${DB_HOST:-postgres}:${DB_PORT:-5433})...' &&
        python manage.py wait_for_db &&
        echo '📦 Running migrations...' &&
        python manage.py migrate --noinput &&
        echo '🔐 Initializing default users...' &&
        python manage.py init_db --skip-if-exists &&
        echo '📁 Collecting static files...' &&
        python manage.py collectstatic --noinput --clear &&
        echo '🚀 Starting Gunicorn server on 0.0.0.0:8001...' &&
        gunicorn --bind 0.0.0.0:8001 --workers 4 --threads 2 --timeout 120 --access-logfile - --error-logfile - backend.wsgi:application
      "
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: lms_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      MODE: ${MODE:-development}
      FRONTEND_SITE_URL: ${FRONTEND_SITE_URL:-http://localhost:5174}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
      VITE_PORT: 5174
    ports:
      - "5174:5174"
    networks:
      - lms_network

networks:
  lms_network:
    driver: bridge
    name: lms_network

volumes:
  redis_data:
    name: lms_redis_data
  # ⚠️ PHASE 3: media_files volume DEPRECATED - no longer used for new content
  # Kept only for backward compatibility with existing media files
  postgres_data:
    name: lms_postgres_data
  media_files:
    name: lms_media_files
  static_files:
    name: lms_static_files
  backend_logs:
    name: lms_backend_logs
