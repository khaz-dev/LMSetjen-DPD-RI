# ============================================
# Docker Compose Configuration
# LMSetjen DPD RI - Learning Management System
# ============================================

version: '3.8'

# ============================================
# Services
# ============================================
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-django_lms_db}
      POSTGRES_USER: ${DB_USER:-lms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - lms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: lms_backend
    restart: unless-stopped
    environment:
      # Database
      DB_NAME: ${DB_NAME:-django_lms_db}
      DB_USER: ${DB_USER:-lms_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password}
      DB_HOST: postgres
      DB_PORT: 5432
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      
      # Django
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      
      # Email
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      
      # URLs
      FRONTEND_SITE_URL: ${FRONTEND_SITE_URL:-http://localhost}
      BACKEND_SITE_URL: ${BACKEND_SITE_URL:-http://localhost:8000}
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms_network
    command: >
      sh -c "
        echo '🔄 Waiting for database...' &&
        python manage.py wait_for_db &&
        echo '📦 Running migrations...' &&
        python manage.py migrate --noinput &&
        echo '� Initializing default users...' &&
        python manage.py init_db --skip-if-exists &&
        echo '�📁 Collecting static files...' &&
        python manage.py collectstatic --noinput --clear &&
        echo '🚀 Starting Gunicorn server...' &&
        gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120 --access-logfile - --error-logfile - backend.wsgi:application
      "

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: /api
    container_name: lms_frontend
    restart: unless-stopped
    # Note: No BACKEND_URL env var - nginx must always proxy to internal Docker network (http://backend:8000)
    volumes:
      # SSL certificates (read-only)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      # Django static files - served directly by nginx for performance
      - static_files:/usr/share/nginx/html/static:ro
      # Django media files - served directly by nginx for performance  
      - media_files:/usr/share/nginx/html/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ============================================
# Networks
# ============================================
networks:
  lms_network:
    driver: bridge
    name: lms_network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: lms_postgres_data
  redis_data:
    name: lms_redis_data
  media_files:
    name: lms_media_files
  static_files:
    name: lms_static_files
  backend_logs:
    name: lms_backend_logs
