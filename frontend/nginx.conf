# ============================================
# Nginx Configuration with SSL Support
# LMSetjen DPD RI - Learning Management System
# ============================================

# HTTP Server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server - Main Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # DNS Resolution (for Docker container hostnames)
    # ============================================
    # Enable runtime DNS resolution for proxy_pass to Docker containers
    # Docker's embedded DNS server is at 127.0.0.11:53
    resolver 127.0.0.11:53 valid=10s;
    resolver_timeout 5s;
    set $backend_upstream "backend:8000";

    # ============================================
    # SSL Configuration
    # ============================================
    ssl_certificate /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem;
    
    # SSL protocols and ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL session configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    # resolver for OCSP (same as for Docker DNS)
    # resolver_timeout 5s;

    # ============================================
    # Security Headers
    # ============================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ============================================
    # Upload Configuration
    # ============================================
    # Allow large file uploads (videos can be up to 500MB)
    client_max_body_size 500M;
    client_body_timeout 300s;
    client_header_timeout 300s;
    
    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json 
               application/xml image/svg+xml;

    # ============================================
    # Backend Proxies (MUST come before regex locations!)
    # ============================================
    
    # Django Static files - serve directly from filesystem for best performance
    # Files are collected via 'python manage.py collectstatic' in backend container
    # and shared via Docker volume mount to /usr/share/nginx/html/static
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Fallback to backend proxy if file not found (for dynamic content)
        try_files $uri @backend_static;
    }
    
    # Fallback location for static files not found on filesystem
    location @backend_static {
        set $backend_url "http://backend:8000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Buffer configuration
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }

    # Media files - serve directly from filesystem for best performance
    # Uploaded user content shared via Docker volume mount to /usr/share/nginx/html/media
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Fallback to backend proxy for enhanced media processing
        try_files $uri @backend_media;
    }
    
    # Fallback location for media files not found or requiring backend processing
    location @backend_media {
        set $backend_url "http://backend:8000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Buffer configuration
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }

    # ============================================
    # Admin Routes - CRITICAL ORDER!
    # React admin routes MUST come before Django admin proxy
    # ============================================
    
    # React Admin Routes - Specific paths for React SPA
    # These handle the React-based admin interface
    location ~ ^/admin/(dashboard|users|courses|analytics|reports|system|profile)/ {
        # Serve React SPA for admin routes
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Django Admin proxy - Only for Django's built-in admin panel
    # This catches /admin/ and /admin/* that aren't React routes
    location /admin {
        set $backend_url "http://backend:8000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer configuration
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }

    # Swagger API Documentation proxy
    location /swagger {
        set $backend_url "http://backend:8000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;
        
        # Buffer configuration
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # Redoc API Documentation proxy
    location /redoc {
        set $backend_url "http://backend:8000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;
        
        # Buffer configuration
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # API proxy to backend
    location /api/ {
        set $backend_url "http://backend:8000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;

        # Timeouts - Extended for large file uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffer configuration - Increased to handle large Django response headers
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
        proxy_max_temp_file_size 0;

        # Allow large request bodies for file uploads
        client_max_body_size 500M;
    }

    # ============================================
    # Cache Configuration for Frontend Assets
    # ============================================
    
    # Cache frontend static assets (images and fonts from React build)
    # This regex specifically excludes /media/ and /static/ which are proxied above
    location ~* ^/(?!media/|static/|api/|admin/|swagger|redoc).*\.(png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # NO CACHING for frontend JS and CSS files (React build artifacts)
    # This only applies to React's own JS/CSS, not Django's /static/ files
    location ~* ^/(?!static/).*\.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # ============================================
    # React SPA Fallback (MUST be last!)
    # ============================================
    
    # Handle React Router - catch-all for client-side routing
    # This must be the last location block
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ============================================
    # Health Check & Monitoring
    # ============================================
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Nginx status (optional, restrict access in production)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # ============================================
    # Error Pages
    # ============================================
    
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
